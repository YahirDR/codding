<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Practica CV</title>
    <div class="cabeza">
        <img class="background_nombre" 
        src="../img/background_nombre.gif" 
        alt="Foto de fondo del nombre">
        <h1 class="nombre">Juan Yahir Duran Ruíz</h1>
        
    </div>
</head>
<body class="body">
    <div class="datos_personales">
        <!-- Datos -->
         <div class="dato_personal">
            <h1>Sobre mi</h1>
            <label class="sobreMi">Soy egresado de Ingenieria en Sistemas Computacionales del ITSUR. Durante mi formacion desarrolle habilidades en analisis, desarrollo y solucion de problemas, trabajando con tecnologias enfocadas en desarrollo web, programacion y bases de datos.</label>
         </div>
         <div class="imagen_contenedor">
            <a href="https://surguanajuato.tecnm.mx/" target="_blank">
                <img class="imagen_itsur" 
                src="../img/imagen_itsur.png"  
                alt="Foto del itsur">
            </a>
         </div>
         
    </div>
    <!-- Inicio de la integracion con la API REST de GitHub -->
    <div class="github"> 
        <h2 id="githubTitulo" class="github-titulo">Proyectos en GitHub</h2>
        <div id="githubContenido">
        <div class="github_proyectos_contenedor">
            <label class="sobreMi_github" id="githubLabel">
                Mis Proyectos universitarios y personales más relevantes en GitHub:
            </label>
            
            <!-- Contenedor donde se cargarán los repositorios -->
            <div class="github_proyectos_grid" id="githubReposGrid">
                <!-- Aquí se insertarán los proyectos automáticamente -->
            </div>
        </div>
    </div>
    <!-- Softwares --> 
    <div class="software">
            <h2 id="softwareTitle" class="software-titulo collapsed" onclick="toggleSoftware()">Conjunto de tecnologías aplicadas en mis proyectos.</h2>
            <div class="softwares software-content-hidden" id="softwareContent">
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_sql.png" alt="SQL">
                    <span>SQL</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_mysql.png" alt="MySQL">
                    <span>MySQL</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_javascript.png" alt="JavaScript">
                    <span>JavaScript</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_html.png" alt="HTML">
                    <span>HTML</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_css.png" alt="CSS">
                    <span>CSS</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/logo_github.png" alt="GitHub">
                    <span>GitHub</span>
                </div>
                <div class="software_objeto">
                    <img class="software_img" src="../img/Logo_python.png" alt="Python">
                    <span>Python</span>
                </div>
            </div>
    </div>
</body>
    <!-- pie de pagina --> 
    <footer class="footer">
        <div class="footer-container">
            <h3>Contáctame:</h3>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/juan-yahir-duran-b56462200/" target="_blank" class="social-link">
                    <img src="../img/logo_linkedin.png" alt="LinkedIn" class="social-img">
                    <span class="social-name">LinkedIn</span>
                </a>
                <a href="https://github.com/YahirDR" target="_blank" class="social-link">
                    <img src="../img/logo_github.png" alt="GitHub" class="social-img">
                    <span class="social-name">GitHub</span>
                </a>
                <a href="javascript:void(0)" class="social-link" onclick="copiarEmail(event)" >
                    <span class="social-icon">📧</span>
                    <span class="social-name">Email</span>
                </a>
            </div>
        </div>
    </footer>
<script src="../java/comandos.js"></script>
</html>
